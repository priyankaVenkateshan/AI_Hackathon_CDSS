# CDSS CI/CD – lint, test, build, Docker
# Runs on push/PR to main/choros

name: CI

on:
  push:
    branches: [main, master, choros]
  pull_request:
    branches: [main, master]

env:
  PYTHON_VERSION: '3.12'
  NODE_VERSION: '20'

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install package and deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install boto3

      - name: Syntax / import check
        run: |
          python -m py_compile src/cdss/api/handlers/router.py
          python -m py_compile src/cdss/api/handlers/appointments.py
          python -m py_compile src/cdss/api/handlers/tasks.py
          python -m py_compile src/cdss/api/handlers/ai.py
          python -c "import cdss.api.handlers.router; print('router OK')"

      - name: Local API handler tests (mocked DB)
        run: python scripts/test_api_local.py
        env:
          DATABASE_URL: ""
          RDS_CONFIG_SECRET_NAME: ""

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: frontend/apps/doctor-dashboard
        run: npm install --legacy-peer-deps

      - name: Build
        working-directory: frontend/apps/doctor-dashboard
        env:
          VITE_API_URL: ''
          VITE_USE_MOCK: 'false'
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/apps/doctor-dashboard/dist/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/choros'
    steps:
      - uses: actions/checkout@v4

      - name: Build Backend Image
        run: docker build -f Dockerfile.backend -t cdss-backend:latest .

      - name: Build Frontend Image
        run: docker build -f Dockerfile.frontend -t cdss-frontend:latest .

      - name: Verify Backend Container Starts
        run: |
          docker run -d --name cdss-test -p 8080:8080 \
            -e PYTHONPATH=/app/src \
            cdss-backend:latest
          sleep 10
          curl -sf http://localhost:8080/health || echo "Health check skipped (no DB)"
          docker stop cdss-test
          docker rm cdss-test
