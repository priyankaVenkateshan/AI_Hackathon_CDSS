version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cdss-db
    environment:
      POSTGRES_DB: cdss
      POSTGRES_USER: cdss_admin
      POSTGRES_PASSWORD: cdss_secure_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/database/seed_data.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cdss_admin -d cdss"]
      interval: 10s
      timeout: 5s
      retries: 5

  # CDSS Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: cdss-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgresql://cdss_admin:cdss_secure_password@postgres:5432/cdss
      PORT: "8080"
      AWS_REGION: ap-south-1
      PYTHONPATH: /app/src
      BEDROCK_CONFIG_SECRET_NAME: ""
      RDS_CONFIG_SECRET_NAME: ""
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

  # CDSS Frontend (Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_URL: ""
        VITE_USE_MOCK: "false"
    container_name: cdss-frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
